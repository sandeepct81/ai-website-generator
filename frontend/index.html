<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Website Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1><i class="fas fa-robot"></i> AI Website Generator</h1>
            <p>Describe your dream website and let AI build it for you</p>
        </header>

        <!-- Main Input Section -->
        <div class="input-section">
            <div class="prompt-box">
                <textarea 
                    id="promptInput" 
                    placeholder="Example: Create a modern portfolio website for a professional photographer with a gallery, about section, and contact form"
                    rows="4"
                ></textarea>
                <button id="generateBtn" class="generate-btn">
                    <i class="fas fa-magic"></i> Generate Website
                </button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner hidden">
            <div class="spinner"></div>
            <p>Generating your website... This may take a moment.</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden">
            <i class="fas fa-exclamation-circle"></i>
            <span id="errorText"></span>
        </div>

        <!-- Generated Website Preview -->
        <div id="previewSection" class="preview-section hidden">
            <div class="preview-header">
                <h2><i class="fas fa-eye"></i> Live Preview</h2>
                <div class="preview-actions">
                    <button id="downloadBtn" class="action-btn">
                        <i class="fas fa-download"></i> Download
                    </button>
                    <button id="copyBtn" class="action-btn">
                        <i class="fas fa-copy"></i> Copy Code
                    </button>
                </div>
            </div>
            <div class="preview-container">
                <iframe id="previewFrame" class="preview-frame"></iframe>
            </div>
        </div>

        <!-- History Section -->
        <div class="history-section">
            <h2><i class="fas fa-history"></i> Previous Projects</h2>
            <div id="projectsList" class="projects-grid">
                <!-- Projects will be loaded here -->
                <div class="loading-projects">Loading projects...</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
